<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/d3-dag@1.1.0"></script>

<script type="text/javascript">

    const DEFAULT_STREAM = "stable-4.21";
    const OPENSHIFT_CLI_PUB_MIRROR = "https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/";

    let graph_state = null;
    let current_graph_data = null;
    let current_selected_node_id = null;
    let active_view = "force";
    let text_measure_context = null;
    let version_map_worker = null;
    let version_map_request_id = 0;
    let network_most_recent;
    let current_channel;
    let current_stream_version;

    function failure(msg) {
        console.log("Failure:", msg);

        let t = $('<div class="mt-3 failure alert alert-danger alert-dismissible fade show" role="alert">' +
                '<strong>Failure!</strong> <span class="msg"></span>' +
                '  <button type="button" class="close" data-dismiss="alert" aria-label="Close">\n' +
                '    <span aria-hidden="true">&times;</span>\n' +
                '  </button>'+
                '</div>');

        t.find(".msg").text(msg);

        $("main").append(t);
        t.alert();
    }

    function semver_compare(a,b) {
        let av = a.split(".");
        let bv = b.split(".");

        for (let i=0; i< Math.min(av.length, bv.length); i++) {
            let ac = parseInt(av[i], 10);
            let bc = parseInt(bv[i], 10);
            let r = ac-bc;
            if (r !== 0) {
                return r;
            }
        }
        return 0; // equal
    }

    function is_stream_version(stream_version, version) {

        if (stream_version === null) {
            return false;
        }

        let v = version.split(".");
        return stream_version.major === v[0] && stream_version.minor === v[1];

    }

    function graph_dimensions() {
        let container = document.getElementById("graph");
        let rect = container.getBoundingClientRect();
        return {
            width: Math.max(rect.width, 320),
            height: Math.max(rect.height, 320),
        };
    }

    function stop_graph() {
        if (graph_state && graph_state.simulation) {
            graph_state.simulation.stop();
        }
        if (graph_state && graph_state.resizeHandler) {
            window.removeEventListener("resize", graph_state.resizeHandler);
        }
        graph_state = null;
        d3.select("#graph").selectAll("*").remove();
    }

    function ensure_version_map_worker() {
        if (version_map_worker || typeof Worker === "undefined") {
            return version_map_worker;
        }

        version_map_worker = new Worker("version-map-worker.js");
        return version_map_worker;
    }

    function cancel_version_map_work() {
        version_map_request_id += 1;

        if (version_map_worker) {
            version_map_worker.terminate();
            version_map_worker = null;
        }
    }

    function set_active_view(view) {
        if (active_view === "version-map" && view !== "version-map") {
            cancel_version_map_work();
            set_progress(1);
        }

        active_view = view;

        $("#graph-tabs .nav-link").removeClass("active");
        $("#graph-tabs .nav-link[data-view='" + view + "']").addClass("active");

        render_current_graph();
    }

    function render_current_graph() {
        if (!current_graph_data) {
            return;
        }

        if (active_view === "version-map") {
            render_version_map(current_graph_data);
        } else {
            render_force_graph(current_graph_data);
            if (graph_state) {
                graph_state.selected_node_id = current_selected_node_id;
            }
            update_selection();
        }
    }

    function schedule_graph_render() {
        if (!graph_state || graph_state.render_pending) {
            return;
        }

        graph_state.render_pending = true;
        window.requestAnimationFrame(function() {
            if (!graph_state) {
                return;
            }
            graph_state.render_pending = false;
            render_graph_now();
        });
    }

    function render_graph_now() {
        if (!graph_state) {
            return;
        }

        if (graph_state.render_now) {
            graph_state.render_now();
        }
    }

    function edge_endpoint(from, to, inset) {
        let dx = to.x - from.x;
        let dy = to.y - from.y;
        let length = Math.hypot(dx, dy);

        if (!length) {
            return { x: from.x, y: from.y };
        }

        let half_width = from.node_width / 2;
        let half_height = from.node_height / 2;
        let scale = 1 / Math.max(Math.abs(dx) / half_width, Math.abs(dy) / half_height);
        let distance = Math.max(0, (length * scale) - inset);

        return {
            x: from.x + (dx / length) * distance,
            y: from.y + (dy / length) * distance,
        };
    }

    function node_fill(d) {
        return d.is_most_recent ? "#95c3ff" : "#CCCCCC";
    }

    function edge_color(d, selected_id) {
        if (!selected_id) {
            return "#DDDDDD";
        }
        if (d.source.id === selected_id) {
            return "#7bc084";
        }
        if (d.target.id === selected_id) {
            return "#efdf29";
        }
        return "#DDDDDD";
    }

    function edge_opacity(d, selected_id) {
        if (!selected_id) {
            return 0.75;
        }
        if (d.source.id === selected_id || d.target.id === selected_id) {
            return 1;
        }
        return 0.18;
    }

    function node_spacing_radius(d) {
        return d.node_collision_radius + 10;
    }

    function simulation_progress(simulation, initial_alpha) {
        let alpha = Math.max(simulation.alpha(), simulation.alphaMin());
        let start = Math.max(initial_alpha, simulation.alphaMin());
        let end = simulation.alphaMin();

        if (start <= end) {
            return 1;
        }

        return Math.log(start / alpha) / Math.log(start / end);
    }

    function estimate_text_width(text) {
        if (text_measure_context === null) {
            let canvas = document.createElement("canvas");
            text_measure_context = canvas.getContext("2d");
            text_measure_context.font = "11px sans-serif";
        }

        return text_measure_context.measureText(text).width;
    }

    function ensure_node_metrics(graph_data) {
        graph_data.nodes.forEach(function(node) {
            if (node.node_width !== undefined) {
                return;
            }

            let text_width = estimate_text_width(node.label);
            node.node_width = Math.max(38, Math.ceil(text_width + 18));
            node.node_height = 22;
            node.node_radius = Math.ceil(node.node_height / 2);
            node.node_collision_radius = Math.ceil(Math.max(node.node_width, node.node_height) / 2) + 4;
        });
    }

    function update_graph_styles() {
        if (!graph_state) {
            return;
        }

        let selected_id = graph_state.selected_node_id;
        let related = selected_id ? graph_state.related_node_ids[selected_id] : null;

        if (graph_state.view_type === "version-map") {
            graph_state.link
                .attr("stroke", "#DDDDDD")
                .attr("stroke-dasharray", null)
                .attr("stroke-opacity", 0.75);
        } else {
            graph_state.link
                .attr("stroke", function(d) { return edge_color(d, selected_id); })
                .attr("stroke-dasharray", function(d) {
                    if (selected_id && d.target.id === selected_id) {
                        return "4 3";
                    }
                    return null;
                })
                .attr("stroke-opacity", function(d) { return edge_opacity(d, selected_id); });
        }

        graph_state.node_shape
            .attr("fill", function(d) { return node_fill(d); })
            .attr("stroke", function(d) {
                if (d.id === selected_id) {
                    return "#222222";
                }
                if (related && related.has(d.id)) {
                    return "#5a5a5a";
                }
                return "#BBBBBB";
            })
            .attr("stroke-width", function(d) {
                return d.id === selected_id ? 2.5 : 1.2;
            })
            .attr("opacity", function(d) {
                if (!selected_id) {
                    return 1;
                }
                if (d.id === selected_id || related.has(d.id)) {
                    return 1;
                }
                return 0.3;
            });

        graph_state.node_text
            .attr("opacity", function(d) {
                if (!selected_id) {
                    return d.is_most_recent ? 1 : 0.75;
                }
                if (d.id === selected_id || related.has(d.id)) {
                    return 1;
                }
                return 0.2;
            })
            .attr("fill", function(d) {
                return d.id === selected_id ? "#111111" : "#404040";
            })
            .attr("font-weight", function(d) {
                return d.id === selected_id || d.is_most_recent ? "600" : "400";
            });
    }

    function update_selection() {
        let node = null;

        if (graph_state && graph_state.selected_node_id !== null) {
            node = graph_state.nodes_by_id[graph_state.selected_node_id];
        }

        if (node !== null) {
            set_info("Version", node.label, node.from_versions, node.to_versions, node.data.errata);
        } else {
            set_info();
        }

        update_graph_styles();
    }

    function select_node(node_id) {
        current_selected_node_id = node_id;

        if (!graph_state) {
            return;
        }

        graph_state.selected_node_id = node_id;
        update_selection();
    }

    function build_graph_data(data) {
        let nodes = [];
        let nodes_by_id = {};
        let most_recent = null;

        for (let i = 0; i < data.nodes.length; i++) {
            let node = data.nodes[i];
            let id = "" + i;

            if (!is_hotfix(node.version)) {
                if (current_stream_version && is_stream_version(current_stream_version, node.version)) {
                    if ((most_recent == null) || semver_compare(most_recent.version, node.version) < 0) {
                        most_recent = { version: node.version, index: i };
                    }
                }
            }

            let graph_node = {
                id: id,
                label: node.version,
                data: {
                    errata: node.metadata.url,
                },
                from_versions: [],
                to_versions: [],
                incoming_ids: new Set(),
                outgoing_ids: new Set(),
                is_most_recent: false,
            };

            nodes.push(graph_node);
            nodes_by_id[id] = graph_node;
        }

        let links = data.edges.map(function(path) {
            let source = "" + path[0];
            let target = "" + path[1];
            let source_node = nodes_by_id[source];
            let target_node = nodes_by_id[target];

            source_node.to_versions.push(target_node.label);
            source_node.outgoing_ids.add(target);
            target_node.from_versions.push(source_node.label);
            target_node.incoming_ids.add(source);

            return {
                source: source,
                target: target,
            };
        });

        nodes.forEach(function(node) {
            node.from_versions.sort(semver_compare);
            node.to_versions.sort(semver_compare);
        });

        if (most_recent !== null) {
            nodes_by_id["" + most_recent.index].is_most_recent = true;
        }

        let related_node_ids = {};
        nodes.forEach(function(node) {
            related_node_ids[node.id] = new Set([
                ...node.incoming_ids,
                ...node.outgoing_ids,
            ]);
        });

        return {
            nodes: nodes,
            nodes_by_id: nodes_by_id,
            links: links,
            related_node_ids: related_node_ids,
            most_recent: most_recent,
        };
    }

    function initialize_graph_svg(dimensions) {
        let svg = d3.select("#graph")
            .append("svg")
            .attr("viewBox", "0 0 " + dimensions.width + " " + dimensions.height)
            .attr("width", dimensions.width)
            .attr("height", dimensions.height)
            .style("width", "100%")
            .style("height", "100%")
            .style("cursor", "grab");

        let root = svg.append("g");

        let zoom = d3.zoom()
            .scaleExtent([0.2, 4])
            .on("zoom", function(event) {
                dismiss_graph_loading();
                root.attr("transform", event.transform);
            });

        svg.call(zoom);
        svg.call(
            zoom.transform,
            d3.zoomIdentity
                .translate(dimensions.width / 2, dimensions.height / 2)
                .scale(1.5)
                .translate(-dimensions.width / 2, -dimensions.height / 2)
        );

        svg.on("click", function() {
            dismiss_graph_loading();
            select_node(null);
        });

        let defs = svg.append("defs");
        defs.append("marker")
            .attr("id", "arrowhead")
            .attr("viewBox", "0 -5 10 10")
            .attr("refX", 10)
            .attr("refY", 0)
            .attr("markerWidth", 6)
            .attr("markerHeight", 6)
            .attr("orient", "auto")
            .append("path")
            .attr("fill", "context-stroke")
            .attr("d", "M0,-5L10,0L0,5");

        return {
            svg: svg,
            root: root,
        };
    }

    function create_graph_nodes(root, graph_data, drag_behavior) {
        ensure_node_metrics(graph_data);

        let node = root.append("g")
            .selectAll("g")
            .data(graph_data.nodes)
            .join("g")
            .style("cursor", "pointer")
            .on("click", function(event, d) {
                event.stopPropagation();
                dismiss_graph_loading();
                select_node(d.id);
            });

        if (drag_behavior) {
            node.call(drag_behavior);
        }

        let node_text = node.append("text")
            .text(function(d) { return d.label; })
            .attr("font-size", 11)
            .attr("fill", "#404040")
            .attr("text-anchor", "middle")
            .attr("dominant-baseline", "central")
            .attr("pointer-events", "none");

        let node_shape = node.insert("rect", "text")
            .attr("x", function(d) { return -d.node_width / 2; })
            .attr("y", function(d) { return -d.node_height / 2; })
            .attr("width", function(d) { return d.node_width; })
            .attr("height", function(d) { return d.node_height; })
            .attr("rx", function(d) { return d.node_radius; })
            .attr("ry", function(d) { return d.node_radius; })
            .attr("fill", function(d) { return node_fill(d); })
            .attr("stroke", "#BBBBBB")
            .attr("stroke-width", 1.2);

        node.append("title")
            .text(function(d) { return d.label; });

        return {
            node: node,
            node_shape: node_shape,
            node_text: node_text,
        };
    }

    function render_force_graph(graph_data) {
        stop_graph();

        set_progress(0);

        let dimensions = graph_dimensions();
        let canvas = initialize_graph_svg(dimensions);
        let root = canvas.root;
        canvas.svg.style("visibility", "hidden");

        let link = root.append("g")
            .attr("stroke-linecap", "round")
            .selectAll("line")
            .data(graph_data.links)
            .join("line")
            .attr("stroke", "#DDDDDD")
            .attr("stroke-width", 1.2)
            .attr("marker-end", "url(#arrowhead)");

        let node_parts = create_graph_nodes(
            root,
            graph_data,
            d3.drag()
                .on("start", function(event, d) {
                    d.was_dragged = false;
                    d.fx = d.x;
                    d.fy = d.y;
                })
                .on("drag", function(event, d) {
                    if (!d.was_dragged) {
                        d.was_dragged = true;
                        graph_state.simulation.alphaTarget(0.12).restart();
                    }
                    d.fx = event.x;
                    d.fy = event.y;
                })
                .on("end", function(event, d) {
                    if (d.was_dragged && !event.active) {
                        graph_state.simulation.alphaTarget(0);
                    }
                    d.fx = null;
                    d.fy = null;
                    d.was_dragged = false;
                })
        );

        let simulation = d3.forceSimulation(graph_data.nodes)
            .force("link", d3.forceLink(graph_data.links).id(function(d) { return d.id; }).distance(42).strength(0.35))
            .force("charge", d3.forceManyBody().strength(-110).theta(0.9).distanceMax(500))
            .force("collide", d3.forceCollide().radius(node_spacing_radius).iterations(2).strength(0.9))
            .force("center", d3.forceCenter(dimensions.width / 2, dimensions.height / 2))
            .alphaDecay(0.06)
            .velocityDecay(0.45);

        graph_state = {
            svg: canvas.svg,
            simulation: simulation,
            view_type: "force",
            initial_alpha: simulation.alpha(),
            node: node_parts.node,
            node_shape: node_parts.node_shape,
            node_text: node_parts.node_text,
            link: link,
            nodes_by_id: graph_data.nodes_by_id,
            related_node_ids: graph_data.related_node_ids,
            selected_node_id: null,
            progress_enabled: true,
            render_pending: false,
            revealed: false,
            loading_dismissed: false,
            render_now: function() {
                graph_state.link
                    .attr("x1", function(d) { return edge_endpoint(d.source, d.target, 0).x; })
                    .attr("y1", function(d) { return edge_endpoint(d.source, d.target, 0).y; })
                    .attr("x2", function(d) { return edge_endpoint(d.target, d.source, 0).x; })
                    .attr("y2", function(d) { return edge_endpoint(d.target, d.source, 0).y; });

                graph_state.node
                    .attr("transform", function(d) { return "translate(" + d.x + "," + d.y + ")"; });
            },
            resizeHandler: function() {
                if (!graph_state) {
                    return;
                }

                let next_dimensions = graph_dimensions();
                graph_state.svg
                    .attr("viewBox", "0 0 " + next_dimensions.width + " " + next_dimensions.height)
                    .attr("width", next_dimensions.width)
                    .attr("height", next_dimensions.height);
                graph_state.simulation.force("center", d3.forceCenter(next_dimensions.width / 2, next_dimensions.height / 2));
                graph_state.simulation.alpha(0.2).restart();
            }
        };

        window.addEventListener("resize", graph_state.resizeHandler);

        simulation.on("tick", function() {
            if (graph_state && graph_state.progress_enabled) {
                let progress = simulation_progress(simulation, graph_state.initial_alpha);
                set_progress(Math.max(0, Math.min(progress, 0.99)));

                if (!graph_state.revealed && progress >= 0.8) {
                    graph_state.revealed = true;
                    graph_state.svg.style("visibility", "visible");
                    $("#graph-loading-text").text("Finalizing layout.");
                }
            }
            schedule_graph_render();
        });
        simulation.on("end", function() {
            if (graph_state) {
                graph_state.progress_enabled = false;
                if (!graph_state.revealed) {
                    graph_state.revealed = true;
                    graph_state.svg.style("visibility", "visible");
                }
            }
            render_graph_now();
            set_progress(1);
        });

        update_graph_styles();
    }

    function build_sugiyama_layout(graph_data) {
        if (graph_data.version_map_layout) {
            return graph_data.version_map_layout;
        }

        ensure_node_metrics(graph_data);

        let dag_input = graph_data.nodes.map(function(node) {
            return {
                id: node.id,
                parentIds: Array.from(node.incoming_ids),
                node: node,
            };
        });

        let stratify = d3.graphStratify()
            .id(function(d) { return d.id; })
            .parentIds(function(d) { return d.parentIds; });

        let dag = stratify(dag_input);
        let layout = d3.sugiyama()
            .layering(d3.layeringLongestPath())
            .decross(d3.decrossTwoLayer())
            .coord(d3.coordGreedy())
            .nodeSize(function(node) {
                return [node.data.node.node_height + 32, node.data.node.node_width + 56];
            });

        let layout_size = layout(dag);
        graph_data.version_map_layout = {
            width: layout_size.height,
            height: layout_size.width,
            nodes: Array.from(dag.nodes()).map(function(dag_node) {
                return {
                    id: dag_node.data.node.id,
                    x: dag_node.y,
                    y: dag_node.x,
                };
            }),
            links: Array.from(dag.links()).map(function(link) {
                return {
                    source_id: link.source.data.node.id,
                    target_id: link.target.data.node.id,
                    points: link.points.map(function(point) {
                        return {
                            x: point.y,
                            y: point.x,
                        };
                    }),
                };
            }),
        };

        return graph_data.version_map_layout;
    }

    function build_sugiyama_layout_async(graph_data) {
        if (graph_data.version_map_layout) {
            return Promise.resolve(graph_data.version_map_layout);
        }

        ensure_node_metrics(graph_data);

        let worker = ensure_version_map_worker();
        if (!worker) {
            return Promise.resolve(build_sugiyama_layout(graph_data));
        }

        version_map_request_id += 1;
        let request_id = version_map_request_id;

        return new Promise(function(resolve, reject) {
            let handle_message = function(event) {
                let message = event.data;
                if (message.requestId !== request_id) {
                    return;
                }

                if (!message.layout && !message.error) {
                    return;
                }

                worker.removeEventListener("message", handle_message);
                worker.removeEventListener("error", handle_error);

                if (message.error) {
                    reject(new Error(message.error));
                    return;
                }

                graph_data.version_map_layout = message.layout;
                resolve(message.layout);
            };

            let handle_error = function(event) {
                worker.removeEventListener("message", handle_message);
                worker.removeEventListener("error", handle_error);
                reject(new Error(event.message || "Failed to compute version map layout"));
            };

            worker.addEventListener("message", handle_message);
            worker.addEventListener("error", handle_error);
            worker.postMessage({
                requestId: request_id,
                nodes: graph_data.nodes.map(function(node) {
                    return {
                        id: node.id,
                        parentIds: Array.from(node.incoming_ids),
                        nodeWidth: node.node_width,
                        nodeHeight: node.node_height,
                    };
                }),
            });
        });
    }

    function apply_sugiyama_layout(graph_data, dimensions) {
        let layout = build_sugiyama_layout(graph_data);
        let horizontal_padding = 64;
        let vertical_padding = 48;
        let width_scale = layout.width > 0 ? Math.max(1, (dimensions.width - (horizontal_padding * 2)) / layout.width) : 1;
        let height_scale = layout.height > 0 ? Math.max(1, (dimensions.height - (vertical_padding * 2)) / layout.height) : 1;

        layout.nodes.forEach(function(layout_node) {
            let node = graph_data.nodes_by_id[layout_node.id];
            node.x = horizontal_padding + (layout_node.x * width_scale);
            node.y = vertical_padding + (layout_node.y * height_scale);
        });

        return layout.links.map(function(link) {
            return {
                source: graph_data.nodes_by_id[link.source_id],
                target: graph_data.nodes_by_id[link.target_id],
                points: link.points.map(function(point) {
                    return {
                        x: horizontal_padding + (point.x * width_scale),
                        y: vertical_padding + (point.y * height_scale),
                    };
                }),
            };
        });
    }

    function version_map_path(d) {
        let start = edge_endpoint(d.source, d.target, 0);
        let end = edge_endpoint(d.target, d.source, 0);
        let points = d.points.slice();

        if (points.length === 0) {
            points = [start, end];
        } else {
            points[0] = start;
            points[points.length - 1] = end;
        }

        return d3.line()
            .x(function(point) { return point.x; })
            .y(function(point) { return point.y; })
            .curve(d3.curveCatmullRom.alpha(0.5))(points);
    }

    function render_version_map(graph_data) {
        stop_graph();

        set_indeterminate_progress("Computing layered version map. This can take a while for large streams.");

        build_sugiyama_layout_async(graph_data)
            .then(function() {
                if (active_view !== "version-map" || current_graph_data !== graph_data) {
                    return;
                }

                let dimensions = graph_dimensions();
                let dag_links = apply_sugiyama_layout(graph_data, dimensions);

                let canvas = initialize_graph_svg(dimensions);
                let root = canvas.root;

                let link = root.append("g")
                    .attr("fill", "none")
                    .attr("stroke-linecap", "round")
                    .selectAll("path")
                    .data(dag_links)
                    .join("path")
                    .attr("stroke", "#DDDDDD")
                    .attr("stroke-width", 1.4)
                    .attr("marker-end", "url(#arrowhead)");

                let node_parts = create_graph_nodes(root, graph_data, null);

                graph_state = {
                    svg: canvas.svg,
                    simulation: null,
                    view_type: "version-map",
                    node: node_parts.node,
                    node_shape: node_parts.node_shape,
                    node_text: node_parts.node_text,
                    link: link,
                    nodes_by_id: graph_data.nodes_by_id,
                    related_node_ids: graph_data.related_node_ids,
                    selected_node_id: current_selected_node_id,
                    progress_enabled: false,
                    render_pending: false,
                    loading_dismissed: false,
                    render_now: function() {
                        graph_state.link.attr("d", version_map_path);
                        graph_state.node
                            .attr("transform", function(d) { return "translate(" + d.x + "," + d.y + ")"; });
                    },
                    resizeHandler: function() {
                        render_current_graph();
                    }
                };

                window.addEventListener("resize", graph_state.resizeHandler);
                render_graph_now();
                set_progress(1);
                update_selection();
            })
            .catch(function(error) {
                if (active_view !== "version-map" || current_graph_data !== graph_data) {
                    return;
                }

                failure("Failed to render version map: " + error.message);
                set_progress(1);
            });
    }

    function set_streams(streams) {
        let preselected = window.location.hash
        if (!preselected) {
            preselected = DEFAULT_STREAM;
        } else {
            preselected = preselected.substring(1);
        }

        let s = $("#streams");
        s.empty();
        let groups = new Map();

        streams.forEach(function(stream) {
            let match = /^([^-]+)-/.exec(stream);
            let group_name = match ? match[1] : "other";

            if (!groups.has(group_name)) {
                groups.set(group_name, $("<optgroup></optgroup>").attr("label", group_name));
            }

            let opt = $("<option></option>")
                .attr("value", stream)
                .text(stream);

            if (preselected === stream) {
                opt.prop("selected", true);
                load(stream);
            }

            groups.get(group_name).append(opt);
        });

        Array.from(groups.keys()).sort().forEach(function(group_name) {
            s.append(groups.get(group_name));
        });
    }

    function update_streams() {
        $.ajax({
            url: "streams.json",
            type: "GET"
        })
            .done(function(data){
                set_streams(data);
            })
            .fail(function(r, e, ex){
                failure("Failed to refresh streams: " + ex);
            });
    }

    function set_channel_overview(o) {
        o.empty();
        if (network_most_recent) {
            o.append($("<h5>Most Recent</h5>"));
            o.append($("<span>" + network_most_recent.version + "</span>"));
        }
    }

    function set_info(type, value, from, to, errata) {
        if(type === undefined || type === null || type === "") {
            $("#info").show();
            $("#info-type").text("Channel");
            $("#info-value").text(current_channel);
            $("#info-version-from-section").hide();
            $("#info-version-to-section").hide();
            $("#info-download-links-section").hide();
            $("#errata-link-section").hide();

            let o = $("#info-overview");
            set_channel_overview(o);
            o.show();

            return;
        }

        $("#info").show();
        $("#info-type").text(type);
        $("#info-value").text(value);
        $("#info-overview").hide();

        if(value !== undefined && value.length>0) {
            // create links
            let l = $("#info-download-links");
            l.empty();
            l.append($("<li><a href=" + OPENSHIFT_CLI_PUB_MIRROR + value + "/openshift-client-linux.tar.gz>oc (Linux x86_64)</a></li>"));
            l.append($("<li><a href=" + OPENSHIFT_CLI_PUB_MIRROR + value + "/openshift-client-mac.tar.gz>oc (Mac)</a></li>"));
            l.append($("<li><a href=" + OPENSHIFT_CLI_PUB_MIRROR + value + "/openshift-client-windows.zip>oc (Windows)</a></li>"));
            l.append($("<li><a href=" + OPENSHIFT_CLI_PUB_MIRROR + value + "/openshift-install-linux.tar.gz>openshift-install (Linux x86_64)</a></li>"));
            l.append($("<li><a href=" + OPENSHIFT_CLI_PUB_MIRROR + value + "/openshift-install-mac.tar.gz>openshift-install (Mac)</a></li>"));
            $("#info-download-links-section").show();
        } else {
            $("#info-download-links-section").hide();
        }

        if(from !== undefined && from.length>0) {
            let l = $("#info-version-from");
            l.empty();
            from.forEach(function(v){
                l.append($("<li></li>").text(v));
            });
            $("#info-version-from-section").show();
        } else {
            $("#info-version-from-section").hide();
        }

        if(to !== undefined && to.length>0) {
            let l = $("#info-version-to");
            l.empty();
            to.forEach(function(v){
                l.append($("<li></li>").text(v));
            });
            $("#info-version-to-section").show();
        } else {
            $("#info-version-to-section").hide();
        }

        if(errata !== undefined && errata !== null && errata !== "") {
            $("#errata-link").attr("href", errata);
            $("#errata-link-section").show();
        } else {
            $("#errata-link-section").hide();
        }
    }

    // check if a version is a hotfix version
    function is_hotfix(version) {
        return version.includes("hotfix");
    }

    function stream_version(stream_id) {
        let s = /.*-([0-9]+)\.([0-9]+)/.exec(stream_id)
        if (s) {
            return {major: s[1], minor: s[2]}
        } else {
            return null;
        }
    }

    function set_progress(p) {
        if (graph_state && graph_state.loading_dismissed) {
            return;
        }
        console.debug("progress", p);
        if (p >= 1) {
            $("#graph-loading").hide();
            $("#graph-loading-text").text("");
            $("#graph-loading-progress").hide();
            $("#graph-loading-progress-bar")
                .width("0%")
                .text("")
                .removeClass("progress-bar-striped progress-bar-animated");
        }
        else {
            const value = Math.ceil(p * 100);
            $("#graph-loading-text").text("Laying out graph.");
            $("#graph-loading-progress").css("display", "flex");
            $("#graph-loading-progress").attr("aria-valuenow", value.toString());
            $("#graph-loading-progress-bar")
                .width(`${value}%`)
                .text("")
                .removeClass("progress-bar-striped progress-bar-animated");
            $("#graph-loading").css("display", "flex");
        }
    }

    function set_indeterminate_progress(message) {
        if (graph_state && graph_state.loading_dismissed) {
            return;
        }
        $("#graph-loading-text").text(message);
        $("#graph-loading-progress").hide();
        $("#graph-loading-progress-bar")
            .width("0%")
            .text("")
            .addClass("progress-bar-striped progress-bar-animated");
        $("#graph-loading").css("display", "flex");
    }

    function dismiss_graph_loading() {
        if (graph_state) {
            graph_state.loading_dismissed = true;
        }
        $("#graph-loading").hide();
        $("#graph-loading-text").text("");
        $("#graph-loading-progress").hide();
        $("#graph-loading-progress-bar")
            .width("0%")
            .text("")
            .removeClass("progress-bar-striped progress-bar-animated");
    }

    function load(stream) {

        stop_graph();
        cancel_version_map_work();
        current_graph_data = null;
        current_selected_node_id = null;
        network_most_recent = null;

        window.location.hash = "#" + stream;

        set_progress(0);

        current_channel = stream;
        current_stream_version = stream_version(stream);
        $("#heading-channel").text(" – " + stream);

        set_info();

        $.ajax({
            url: "streams/" + stream + ".json",
            accepts: {
                json: "application/json",
            },
            type: "GET",
            dataType: "json",
        })
            .done(function(data){
                try {
                    current_graph_data = build_graph_data(data);
                    network_most_recent = current_graph_data.most_recent;
                    render_current_graph();
                }
                catch (e) {
                    failure("Failed to process result: " + e)
                }
            })
        .fail(function(r, e, ex){
            failure("Failed to update graph: " + ex);
            set_progress(1);
        });

    }

    $("#streams").change(function(){
        $("#streams option:selected").each(function(){
            let s = $(this).attr("value");
            load(s);
        });
    });
    $("#graph-tabs .nav-link").click(function() {
        set_active_view($(this).data("view"));
    });
    set_active_view(active_view);
    update_streams();

</script>

</body>
