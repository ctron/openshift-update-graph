<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="A visual representation of the possible OpenShift upgrade paths.">

    <title>OpenShift Update Graph</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        html {
            position: relative;
            min-height: 100%;
        }
        body {
            margin-bottom: 60px;
        }
        .footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            line-height: 60px;
            background-color: #f5f5f5;
        }
        .failure {
            position: absolute;
            top: calc(60px + 1rem);
            right: 2rem;
        }
        #updates {
            height: calc(100vh - 120px);
        }
        #graph-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }
        #graph-tabs {
            flex: 0 0 auto;
        }
        #progress {
            display: none;
        }
        #graph {
            flex: 1 1 auto;
            min-height: 0;
        }
        #graph-loading {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }
        #graph-loading-message {
            max-width: 28rem;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid #d9d9d9;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        #graph-loading-text {
            margin-bottom: 0.5rem;
        }
        #graph-loading-progress {
            display: none;
        }
        #info {
            position: absolute;
            right: 1rem;
            top: 7rem;
        }
    </style>

</head>

<body>

<nav class="navbar navbar-light sticky-top bg-light">
    <div class="container-fluid">
        <span class="navbar-brand">OpenShift Update Graph <span id="heading-channel"></span></span>
        <form class="d-flex">
            <select id="streams" class="form-select"></select>
        </form>
    </div>
</nav>

<main role="main">
    <div class="container-fluid">
        <div class="row" id="progress">
            <div class="col">
                <div id="progress-wrapper" class="progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <div id="updates">
                    <div id="graph-panel">
                        <ul class="nav nav-tabs mb-2" id="graph-tabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="view-force" type="button" data-view="force">Classic</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="view-version-map" type="button" data-view="version-map">Layered DAG</button>
                            </li>
                        </ul>
                        <div id="graph-loading">
                            <div id="graph-loading-message">
                                <div id="graph-loading-text"></div>
                                <div id="graph-loading-progress" class="progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                                    <div id="graph-loading-progress-bar" class="progress-bar"></div>
                                </div>
                            </div>
                        </div>
                        <div id="graph"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<aside id="info" style="display: none;">
    <div class="card" style="width: 18rem;">
        <div class="card-header"><span id="info-value"></span> <span id="info-type" class="badge badge-secondary"></span>
            <span id="errata-link-section" class="float-right">
                <a href="#" class="card-link" target="_blank" id="errata-link">Errata</a>
            </span>
        </div>
        <div class="card-body">

            <div id="info-overview"></div>

            <div id="info-download-links-section">
                <h5 class="card-title">Downloads</h5>
                <ul id="info-download-links"></ul>
            </div>

            <div id="info-version-from-section">
                <h5 class="card-title">From</h5>
                <ul id="info-version-from"></ul>
            </div>

            <div id="info-version-to-section">
                <h5 class="card-title">To</h5>
                <ul id="info-version-to"></ul>
            </div>

        </div>
    </div>
</aside>

<footer class="footer">
    <div class="container-fluid">
        <span class="text-muted">Fork me: <a href="https://github.com/ctron/openshift-update-graph" target="_blank">ctron/openshift-update-graph</a></span>
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/d3-dag@1.1.0"></script>
<script src="app.js"></script>
<script>
    new window.OpenShiftUpdateGraphApp({
        defaultStream: "stable-4.21",
        openshiftCliPubMirror: "https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/",
    }).init();
</script>

</body>
</html>
