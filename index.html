<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="A visual representation of the possible OpenShift upgrade paths.">

    <title>OpenShift Update Graph</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        html {
            position: relative;
            min-height: 100%;
        }
        body {
            margin-bottom: 60px;
        }
        .footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            line-height: 60px;
            background-color: #f5f5f5;
        }
        .failure {
            position: absolute;
            top: calc(60px + 1rem);
            right: 2rem;
        }
        #updates {
            height: calc(100vh - 120px);
        }
        #graph {
            height: 100%;
        }
        #info {
            position: absolute;
            right: 1rem;
            top: 5rem;
        }
    </style>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-H54ZZ588KT"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-H54ZZ588KT');
    </script>

</head>

<body>

<nav class="navbar navbar-light sticky-top bg-light">
    <div class="container-fluid">
        <span class="navbar-brand">OpenShift Update Graph <span id="heading-channel"></span></span>
        <form class="d-flex">
            <select id="streams" class="form-select"></select>
        </form>
    </div>
</nav>

<main role="main">
    <div class="container-fluid">
        <div class="row" id="progress">
            <div class="col">
                <div id="progress-wrapper" class="progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <div id="updates">
                    <div id="graph"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<aside id="info" style="display: none;">
    <div class="card" style="width: 18rem;">
        <div class="card-header"><span id="info-value"></span> <span id="info-type" class="badge badge-secondary"></span>
            <span id="errata-link-section" class="float-right">
                <a href="#" class="card-link" target="_blank" id="errata-link">Errata</a>
            </span>
        </div>
        <div class="card-body">

            <div id="info-overview"></div>

            <div id="info-download-links-section">
                <h5 class="card-title">Downloads</h5>
                <ul id="info-download-links"></ul>
            </div>

            <div id="info-version-from-section">
                <h5 class="card-title">From</h5>
                <ul id="info-version-from"></ul>
            </div>

            <div id="info-version-to-section">
                <h5 class="card-title">To</h5>
                <ul id="info-version-to"></ul>
            </div>

        </div>
    </div>
</aside>

<footer class="footer">
    <div class="container-fluid">
        <span class="text-muted">Fork me: <a href="https://github.com/ctron/openshift-update-graph" target="_blank">ctron/openshift-update-graph</a></span>
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script src="https://d3js.org/d3.v7.min.js"></script>

<script type="text/javascript">

    const DEFAULT_STREAM = "stable-4.21";
    const OPENSHIFT_CLI_PUB_MIRROR = "https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/";

    let graph_state = null;
    let network_most_recent;
    let current_channel;
    let current_stream_version;

    function failure(msg) {
        console.log("Failure:", msg);

        let t = $('<div class="mt-3 failure alert alert-danger alert-dismissible fade show" role="alert">' +
                '<strong>Failure!</strong> <span class="msg"></span>' +
                '  <button type="button" class="close" data-dismiss="alert" aria-label="Close">\n' +
                '    <span aria-hidden="true">&times;</span>\n' +
                '  </button>'+
                '</div>');

        t.find(".msg").text(msg);

        $("main").append(t);
        t.alert();
    }

    function semver_compare(a,b) {
        let av = a.split(".");
        let bv = b.split(".");

        for (let i=0; i< Math.min(av.length, bv.length); i++) {
            let ac = parseInt(av[i], 10);
            let bc = parseInt(bv[i], 10);
            let r = ac-bc;
            if (r !== 0) {
                return r;
            }
        }
        return 0; // equal
    }

    function is_stream_version(stream_version, version) {

        if (stream_version === null) {
            return false;
        }

        let v = version.split(".");
        return stream_version.major === v[0] && stream_version.minor === v[1];

    }

    function graph_dimensions() {
        let container = document.getElementById("graph");
        let rect = container.getBoundingClientRect();
        return {
            width: Math.max(rect.width, 320),
            height: Math.max(rect.height, 320),
        };
    }

    function stop_graph() {
        if (graph_state && graph_state.simulation) {
            graph_state.simulation.stop();
        }
        if (graph_state && graph_state.resizeHandler) {
            window.removeEventListener("resize", graph_state.resizeHandler);
        }
        graph_state = null;
        d3.select("#graph").selectAll("*").remove();
    }

    function schedule_graph_render() {
        if (!graph_state || graph_state.render_pending) {
            return;
        }

        graph_state.render_pending = true;
        window.requestAnimationFrame(function() {
            if (!graph_state) {
                return;
            }
            graph_state.render_pending = false;
            render_graph_now();
        });
    }

    function render_graph_now() {
        if (!graph_state) {
            return;
        }

        graph_state.link
            .attr("x1", function(d) { return edge_endpoint(d.source, d.target, 0).x; })
            .attr("y1", function(d) { return edge_endpoint(d.source, d.target, 0).y; })
            .attr("x2", function(d) { return edge_endpoint(d.target, d.source, 0).x; })
            .attr("y2", function(d) { return edge_endpoint(d.target, d.source, 0).y; });

        graph_state.node
            .attr("transform", function(d) { return "translate(" + d.x + "," + d.y + ")"; });
    }

    function edge_endpoint(from, to, inset) {
        let dx = to.x - from.x;
        let dy = to.y - from.y;
        let length = Math.hypot(dx, dy);

        if (!length) {
            return { x: from.x, y: from.y };
        }

        let half_width = from.node_width / 2;
        let half_height = from.node_height / 2;
        let scale = 1 / Math.max(Math.abs(dx) / half_width, Math.abs(dy) / half_height);
        let distance = Math.max(0, (length * scale) - inset);

        return {
            x: from.x + (dx / length) * distance,
            y: from.y + (dy / length) * distance,
        };
    }

    function node_fill(d) {
        return d.is_most_recent ? "#95c3ff" : "#CCCCCC";
    }

    function node_spacing_radius(d) {
        return d.node_collision_radius + 10;
    }

    function update_graph_styles() {
        if (!graph_state) {
            return;
        }

        let selected_id = graph_state.selected_node_id;
        let related = selected_id ? graph_state.related_node_ids[selected_id] : null;

        graph_state.link
            .attr("stroke", function(d) {
                if (!selected_id) {
                    return "#DDDDDD";
                }
                if (d.source.id === selected_id) {
                    return "#7bc084";
                }
                if (d.target.id === selected_id) {
                    return "#efdf29";
                }
                return "#DDDDDD";
            })
            .attr("stroke-dasharray", function(d) {
                if (selected_id && d.target.id === selected_id) {
                    return "4 3";
                }
                return null;
            })
            .attr("stroke-opacity", function(d) {
                if (!selected_id) {
                    return 0.75;
                }
                if (d.source.id === selected_id || d.target.id === selected_id) {
                    return 1;
                }
                return 0.18;
            });

        graph_state.node_shape
            .attr("fill", function(d) { return node_fill(d); })
            .attr("stroke", function(d) {
                if (d.id === selected_id) {
                    return "#222222";
                }
                if (related && related.has(d.id)) {
                    return "#5a5a5a";
                }
                return "#BBBBBB";
            })
            .attr("stroke-width", function(d) {
                return d.id === selected_id ? 2.5 : 1.2;
            })
            .attr("opacity", function(d) {
                if (!selected_id) {
                    return 1;
                }
                if (d.id === selected_id || related.has(d.id)) {
                    return 1;
                }
                return 0.3;
            });

        graph_state.node_text
            .attr("opacity", function(d) {
                if (!selected_id) {
                    return d.is_most_recent ? 1 : 0.75;
                }
                if (d.id === selected_id || related.has(d.id)) {
                    return 1;
                }
                return 0.2;
            })
            .attr("fill", function(d) {
                return d.id === selected_id ? "#111111" : "#404040";
            })
            .attr("font-weight", function(d) {
                return d.id === selected_id || d.is_most_recent ? "600" : "400";
            });
    }

    function update_selection() {
        let node = null;

        if (graph_state && graph_state.selected_node_id !== null) {
            node = graph_state.nodes_by_id[graph_state.selected_node_id];
        }

        if (node !== null) {
            set_info("Version", node.label, node.from_versions, node.to_versions, node.data.errata);
        } else {
            set_info();
        }

        update_graph_styles();
    }

    function select_node(node_id) {
        if (!graph_state) {
            return;
        }

        graph_state.selected_node_id = node_id;
        update_selection();
    }

    function build_graph_data(data) {
        let nodes = [];
        let nodes_by_id = {};
        let most_recent = null;

        for (let i = 0; i < data.nodes.length; i++) {
            let node = data.nodes[i];
            let id = "" + i;

            if (!is_hotfix(node.version)) {
                if (current_stream_version && is_stream_version(current_stream_version, node.version)) {
                    if ((most_recent == null) || semver_compare(most_recent.version, node.version) < 0) {
                        most_recent = { version: node.version, index: i };
                    }
                }
            }

            let graph_node = {
                id: id,
                label: node.version,
                data: {
                    errata: node.metadata.url,
                },
                from_versions: [],
                to_versions: [],
                incoming_ids: new Set(),
                outgoing_ids: new Set(),
                is_most_recent: false,
            };

            nodes.push(graph_node);
            nodes_by_id[id] = graph_node;
        }

        let links = data.edges.map(function(path) {
            let source = "" + path[0];
            let target = "" + path[1];
            let source_node = nodes_by_id[source];
            let target_node = nodes_by_id[target];

            source_node.to_versions.push(target_node.label);
            source_node.outgoing_ids.add(target);
            target_node.from_versions.push(source_node.label);
            target_node.incoming_ids.add(source);

            return {
                source: source,
                target: target,
            };
        });

        nodes.forEach(function(node) {
            node.from_versions.sort(semver_compare);
            node.to_versions.sort(semver_compare);
        });

        if (most_recent !== null) {
            nodes_by_id["" + most_recent.index].is_most_recent = true;
        }

        let related_node_ids = {};
        nodes.forEach(function(node) {
            related_node_ids[node.id] = new Set([
                ...node.incoming_ids,
                ...node.outgoing_ids,
            ]);
        });

        return {
            nodes: nodes,
            nodes_by_id: nodes_by_id,
            links: links,
            related_node_ids: related_node_ids,
            most_recent: most_recent,
        };
    }

    function render_graph(graph_data) {
        stop_graph();

        let dimensions = graph_dimensions();
        let svg = d3.select("#graph")
            .append("svg")
            .attr("viewBox", "0 0 " + dimensions.width + " " + dimensions.height)
            .attr("width", dimensions.width)
            .attr("height", dimensions.height)
            .style("width", "100%")
            .style("height", "100%")
            .style("cursor", "grab");

        let root = svg.append("g");

        svg.call(
            d3.zoom()
                .scaleExtent([0.2, 4])
                .on("zoom", function(event) {
                    root.attr("transform", event.transform);
                })
        );

        svg.on("click", function() {
            select_node(null);
        });

        let defs = svg.append("defs");
        defs.append("marker")
            .attr("id", "arrowhead")
            .attr("viewBox", "0 -5 10 10")
            .attr("refX", 10)
            .attr("refY", 0)
            .attr("markerWidth", 6)
            .attr("markerHeight", 6)
            .attr("orient", "auto")
            .append("path")
            .attr("fill", "context-stroke")
            .attr("d", "M0,-5L10,0L0,5");

        let link = root.append("g")
            .attr("stroke-linecap", "round")
            .selectAll("line")
            .data(graph_data.links)
            .join("line")
            .attr("stroke", "#DDDDDD")
            .attr("stroke-width", 1.2)
            .attr("marker-end", "url(#arrowhead)");

        let node = root.append("g")
            .selectAll("g")
            .data(graph_data.nodes)
            .join("g")
            .style("cursor", "pointer")
            .on("click", function(event, d) {
                event.stopPropagation();
                select_node(d.id);
            })
            .call(
                d3.drag()
                    .on("start", function(event, d) {
                        if (!event.active) {
                            graph_state.simulation.alphaTarget(0.12).restart();
                        }
                        d.fx = d.x;
                        d.fy = d.y;
                    })
                    .on("drag", function(event, d) {
                        d.fx = event.x;
                        d.fy = event.y;
                    })
                    .on("end", function(event, d) {
                        if (!event.active) {
                            graph_state.simulation.alphaTarget(0);
                        }
                        d.fx = null;
                        d.fy = null;
                    })
            );

        let node_text = node.append("text")
            .text(function(d) { return d.label; })
            .attr("font-size", 11)
            .attr("fill", "#404040")
            .attr("text-anchor", "middle")
            .attr("dominant-baseline", "central")
            .attr("pointer-events", "none");

        node.each(function(d) {
            let bbox = d3.select(this).select("text").node().getBBox();
            d.node_width = Math.max(38, Math.ceil(bbox.width + 18));
            d.node_height = 22;
            d.node_radius = Math.ceil(d.node_height / 2);
            d.node_collision_radius = Math.ceil(Math.max(d.node_width, d.node_height) / 2) + 4;
        });

        let node_shape = node.insert("rect", "text")
            .attr("x", function(d) { return -d.node_width / 2; })
            .attr("y", function(d) { return -d.node_height / 2; })
            .attr("width", function(d) { return d.node_width; })
            .attr("height", function(d) { return d.node_height; })
            .attr("rx", function(d) { return d.node_radius; })
            .attr("ry", function(d) { return d.node_radius; })
            .attr("fill", function(d) { return node_fill(d); })
            .attr("stroke", "#BBBBBB")
            .attr("stroke-width", 1.2);

        node.append("title")
            .text(function(d) { return d.label; });

        let simulation = d3.forceSimulation(graph_data.nodes)
            .force("link", d3.forceLink(graph_data.links).id(function(d) { return d.id; }).distance(42).strength(0.35))
            .force("charge", d3.forceManyBody().strength(-110).theta(0.9).distanceMax(500))
            .force("collide", d3.forceCollide().radius(node_spacing_radius).iterations(2).strength(0.9))
            .force("center", d3.forceCenter(dimensions.width / 2, dimensions.height / 2))
            .alphaDecay(0.06)
            .velocityDecay(0.45);

        graph_state = {
            svg: svg,
            simulation: simulation,
            node: node,
            node_shape: node_shape,
            node_text: node_text,
            link: link,
            nodes_by_id: graph_data.nodes_by_id,
            related_node_ids: graph_data.related_node_ids,
            selected_node_id: null,
            progress_enabled: true,
            render_pending: false,
            resizeHandler: function() {
                if (!graph_state) {
                    return;
                }

                let next_dimensions = graph_dimensions();
                graph_state.svg
                    .attr("viewBox", "0 0 " + next_dimensions.width + " " + next_dimensions.height)
                    .attr("width", next_dimensions.width)
                    .attr("height", next_dimensions.height);
                graph_state.simulation.force("center", d3.forceCenter(next_dimensions.width / 2, next_dimensions.height / 2));
                graph_state.simulation.alpha(0.2).restart();
            }
        };

        window.addEventListener("resize", graph_state.resizeHandler);

        simulation.on("tick", function() {
            if (graph_state && graph_state.progress_enabled) {
                let alpha_min = simulation.alphaMin();
                let progress = 1 - ((simulation.alpha() - alpha_min) / (1 - alpha_min));
                set_progress(Math.max(0, Math.min(progress, 0.99)));
            }
            schedule_graph_render();
        });
        simulation.on("end", function() {
            if (graph_state) {
                graph_state.progress_enabled = false;
            }
            render_graph_now();
            set_progress(1);
        });

        update_graph_styles();
    }

    function set_streams(streams) {
        let preselected = window.location.hash
        if (!preselected) {
            preselected = DEFAULT_STREAM;
        } else {
            preselected = preselected.substring(1);
        }

        let s = $("#streams");
        s.empty();
        streams.forEach(function(stream){
            let opt = $("<option></option>")
                .attr("value", stream)
                .text(stream);
            if (preselected === stream) {
                opt.prop("selected", true);
                load(stream);
            }
            s.append(opt);
        });
    }

    function update_streams() {
        $.ajax({
            url: "streams.json",
            type: "GET"
        })
            .done(function(data){
                set_streams(data);
            })
            .fail(function(r, e, ex){
                failure("Failed to refresh streams: " + ex);
            });
    }

    function set_channel_overview(o) {
        o.empty();
        if (network_most_recent) {
            o.append($("<h5>Most Recent</h5>"));
            o.append($("<span>" + network_most_recent.version + "</span>"));
        }
    }

    function set_info(type, value, from, to, errata) {
        if(type === undefined || type === null || type === "") {
            $("#info").show();
            $("#info-type").text("Channel");
            $("#info-value").text(current_channel);
            $("#info-version-from-section").hide();
            $("#info-version-to-section").hide();
            $("#info-download-links-section").hide();
            $("#errata-link-section").hide();

            let o = $("#info-overview");
            set_channel_overview(o);
            o.show();

            return;
        }

        $("#info").show();
        $("#info-type").text(type);
        $("#info-value").text(value);
        $("#info-overview").hide();

        if(value !== undefined && value.length>0) {
            // create links
            let l = $("#info-download-links");
            l.empty();
            l.append($("<li><a href=" + OPENSHIFT_CLI_PUB_MIRROR + value + "/openshift-client-linux.tar.gz>oc (Linux x86_64)</a></li>"));
            l.append($("<li><a href=" + OPENSHIFT_CLI_PUB_MIRROR + value + "/openshift-client-mac.tar.gz>oc (Mac)</a></li>"));
            l.append($("<li><a href=" + OPENSHIFT_CLI_PUB_MIRROR + value + "/openshift-client-windows.zip>oc (Windows)</a></li>"));
            l.append($("<li><a href=" + OPENSHIFT_CLI_PUB_MIRROR + value + "/openshift-install-linux.tar.gz>openshift-install (Linux x86_64)</a></li>"));
            l.append($("<li><a href=" + OPENSHIFT_CLI_PUB_MIRROR + value + "/openshift-install-mac.tar.gz>openshift-install (Mac)</a></li>"));
            $("#info-download-links-section").show();
        } else {
            $("#info-download-links-section").hide();
        }

        if(from !== undefined && from.length>0) {
            let l = $("#info-version-from");
            l.empty();
            from.forEach(function(v){
                l.append($("<li></li>").text(v));
            });
            $("#info-version-from-section").show();
        } else {
            $("#info-version-from-section").hide();
        }

        if(to !== undefined && to.length>0) {
            let l = $("#info-version-to");
            l.empty();
            to.forEach(function(v){
                l.append($("<li></li>").text(v));
            });
            $("#info-version-to-section").show();
        } else {
            $("#info-version-to-section").hide();
        }

        if(errata !== undefined && errata !== null && errata !== "") {
            $("#errata-link").attr("href", errata);
            $("#errata-link-section").show();
        } else {
            $("#errata-link-section").hide();
        }
    }

    // check if a version is a hotfix version
    function is_hotfix(version) {
        return version.includes("hotfix");
    }

    function stream_version(stream_id) {
        let s = /.*-([0-9]+)\.([0-9]+)/.exec(stream_id)
        if (s) {
            return {major: s[1], minor: s[2]}
        } else {
            return null;
        }
    }

    function set_progress(p) {
        console.debug("progress", p);
        if (p >= 1) {
            $("#progress").hide();
        } else {
            $("#progress").show();
            const value = Math.ceil(p * 100);
            $("#progress-wrapper").attr("aria-valuenow", value.toString());
            $("#progress-bar").width(`${value}%`);
        }
    }

    function load(stream) {

        stop_graph();
        network_most_recent = null;

        window.location.hash = "#" + stream;

        set_progress(0);

        current_channel = stream;
        current_stream_version = stream_version(stream);
        $("#heading-channel").text(" – " + stream);

        set_info();

        $.ajax({
            url: "streams/" + stream + ".json",
            accepts: {
                json: "application/json",
            },
            type: "GET",
            dataType: "json",
        })
            .done(function(data){
                try {
                    let graph_data = build_graph_data(data);
                    network_most_recent = graph_data.most_recent;
                    render_graph(graph_data);
                    set_info();
                }
                catch (e) {
                    failure("Failed to process result: " + e)
                }
            })
        .fail(function(r, e, ex){
            failure("Failed to update graph: " + ex);
            set_progress(1);
        });

    }

    $("#streams").change(function(){
        $("#streams option:selected").each(function(){
            let s = $(this).attr("value");
            load(s);
        });
    });
    update_streams();
